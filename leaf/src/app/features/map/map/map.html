<div class="h-full relative w-full overflow-hidden bg-gray-50 font-sans">
  <div id="map" class="w-full h-full z-0"></div>

  <div
    *ngIf="isLoading"
    class="absolute inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center"
  >
    <div class="bg-white rounded-xl p-8 shadow-2xl flex flex-col items-center gap-4 max-w-sm mx-4">
      <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
      <p class="text-gray-700 font-medium">Chargement en cours...</p>
    </div>
  </div>

  <app-map-controls
    [isManualGeoModeActive]="isManualGeoMode"
    (toggleGestion)="toggleGestionModal()"
    (centerUser)="centerOnUserLocation()"
    (toggleRouting)="toggleRoutingInputs()"
    (toggleFilter)="toggleFilterModal()"
    (exportMarkers)="exportMarkers()"
    (toggleImport)="toggleImportModal()"
    (toggleManualGeo)="toggleManualGeoMode($event)"
  ></app-map-controls>

  <app-gestion-modal
    *ngIf="showGestionModal"
    [markers]="markers"
    [presetCoordinates]="presetMarkerCoordinates"
    (closeModal)="toggleGestionModal()"
    (addMarker)="handleAddMarker($event)"
    (removeMarker)="handleRemoveMarker($event)"
    (centerOnMarker)="centerMapOnMarker($event)"
  ></app-gestion-modal>

  <app-routing-modal
    *ngIf="showRoutingInputs"
    [markers]="markers"
    [userLocation]="userLocation"
    [currentRouteInfo]="currentRouteInfo"
    (calculateRoute)="drawRoute($event.startId, $event.endId)"
    (closeModal)="toggleRoutingInputs()"
  ></app-routing-modal>

  <app-filter-modal
    *ngIf="showFilterModal"
    [filterName]="filterName"
    [filterForm]="filterForm"
    [filterIce]="filterIce"
    [totalMarkers]="markers.length"
    [filteredMarkersCount]="getFilteredMarkersCount()"
    (filtersChange)="onFiltersChange($event.name, $event.form, $event.ice)"
    (clearFilters)="clearFilters()"
    (closeModal)="toggleFilterModal()"
  ></app-filter-modal>

  <app-modal-panel
    *ngIf="showImportModal"
    title="Importer des marqueurs"
    subtitle="Fichier JSON (tableau de marqueurs)"
    accent="blue"
    maxWidthClass="w-full max-w-lg"
    panelClass="absolute top-4 left-4 right-4 mx-auto"
    (closeModal)="toggleImportModal()"
  >
    <div class="p-5 space-y-4">
      <input
        type="file"
        accept=".json,application/json"
        (change)="onImportFileSelected($event)"
        class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
      />
      <label class="flex items-center gap-2 text-sm text-gray-700">
        <input type="checkbox" [(ngModel)]="replaceOnImport" />
        Remplacer les marqueurs existants
      </label>
      <p class="text-xs text-gray-500">
        Les données sont enregistrées dans le navigateur. Exportez régulièrement pour sauvegarder.
      </p>
    </div>
  </app-modal-panel>

  <app-manual-geo-modal
    [visible]="showManualGeoModal"
    [clickedCoordinates]="clickedCoordinates"
    [clickedAddress]="clickedAddress"
    (copyCoordinates)="copyCoordinates()"
    (useCoordinates)="useCoordinatesForNewMarker()"
    (closeModal)="closeManualGeoModal()"
  ></app-manual-geo-modal>
</div>
