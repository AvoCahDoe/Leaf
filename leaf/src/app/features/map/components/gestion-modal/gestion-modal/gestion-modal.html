<app-modal-panel
  title="Gestion des marqueurs"
  subtitle="Ajoutez et gérez vos points d'intérêt"
  accent="blue"
  maxWidthClass="w-full max-w-md md:max-w-lg"
  panelClass="absolute top-4 bottom-3 right-4"
  (closeModal)="onClose()"
>
  <div class="p-5 space-y-5">
    <app-marker-form
      [presetCoordinates]="presetCoordinates"
      (addMarker)="onAddMarker($event)"
    ></app-marker-form>

    <app-marker-list
      [markers]="markers"
      (centerOnMarker)="onCenterOnMarker($event)"
      (removeMarker)="onRemoveMarker($event)"
    ></app-marker-list>
  </div>
</app-modal-panel>
