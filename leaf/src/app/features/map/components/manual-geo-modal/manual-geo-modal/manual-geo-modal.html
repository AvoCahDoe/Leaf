<app-modal-panel
  *ngIf="visible"
  title="Géolocalisation manuelle"
  subtitle="Cliquez sur la carte pour récupérer les coordonnées"
  accent="indigo"
  maxWidthClass="w-full max-w-lg"
  panelClass="absolute top-4 left-[5.5rem] right-4 md:left-[10.5rem] md:right-auto mx-auto"
  (closeModal)="onClose()"
>
  <div class="p-5 space-y-5">
    <p *ngIf="!clickedCoordinates" class="text-sm text-gray-500 text-center py-6">
      Activez le mode, puis cliquez sur un point de la carte.
    </p>

    <ng-container *ngIf="clickedCoordinates">
      <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Coordonnées GPS</h3>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white rounded-lg p-3 border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">Latitude</p>
            <p class="font-mono font-semibold text-gray-900">{{ clickedCoordinates.lat | number : '1.6-6' }}</p>
          </div>
          <div class="bg-white rounded-lg p-3 border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">Longitude</p>
            <p class="font-mono font-semibold text-gray-900">{{ clickedCoordinates.lng | number : '1.6-6' }}</p>
          </div>
        </div>
        <button
          type="button"
          (click)="onCopyCoordinates()"
          class="w-full mt-3 bg-indigo-50 text-indigo-700 py-2 px-4 rounded-lg text-sm font-medium hover:bg-indigo-100 transition-colors"
        >
          Copier les coordonnées
        </button>
      </div>

      <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Adresse approximative</h3>
        <p class="text-sm text-gray-700 leading-relaxed">{{ clickedAddress || 'Recherche en cours...' }}</p>
      </div>

      <button
        type="button"
        (click)="onUseCoordinates()"
        class="w-full bg-indigo-600 text-white py-2.5 px-4 rounded-lg font-medium hover:bg-indigo-700 transition-colors"
      >
        Utiliser pour un nouveau marqueur
      </button>
    </ng-container>
  </div>
</app-modal-panel>
