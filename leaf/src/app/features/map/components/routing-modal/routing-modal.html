<app-modal-panel
  title="Tracer un itinéraire"
  subtitle="Sélectionnez un départ et une destination"
  accent="green"
  maxWidthClass="w-full max-w-sm"
  panelClass="absolute bottom-4 left-4"
  (closeModal)="onClose()"
>
  <div class="p-5 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Point de départ</label>
      <select
        [(ngModel)]="selectedA"
        name="a"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent bg-white"
      >
        <option value="user">Ma position</option>
        <option *ngFor="let m of markers" [value]="m.id">{{ m.name }}</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Destination</label>
      <select
        [(ngModel)]="selectedB"
        name="b"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent bg-white"
      >
        <option value="user">Ma position</option>
        <option *ngFor="let m of markers" [value]="m.id">{{ m.name }}</option>
      </select>
    </div>

    <div
      *ngIf="currentRouteInfo"
      class="bg-green-50 border border-green-200 rounded-lg p-4 space-y-2"
    >
      <div class="flex items-center gap-2 text-green-800 text-sm font-medium">
        Informations de route
      </div>
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="bg-white rounded-lg p-3 border border-green-100">
          <p class="text-gray-600">Distance</p>
          <p class="font-semibold text-green-700">{{ currentRouteInfo.distanceKm }} km</p>
        </div>
        <div class="bg-white rounded-lg p-3 border border-green-100">
          <p class="text-gray-600">Durée estimée</p>
          <p class="font-semibold text-green-700">{{ currentRouteInfo.timeMin }} min</p>
        </div>
      </div>
    </div>

    <button
      (click)="onCalculateRoute()"
      class="w-full bg-green-600 text-white py-2.5 px-4 rounded-lg font-medium hover:bg-green-700 transition-colors"
    >
      Tracer l'itinéraire
    </button>
  </div>
</app-modal-panel>
