<app-modal-panel
  title="Filtrer les marqueurs"
  subtitle="Nom, forme juridique ou ICE"
  accent="orange"
  maxWidthClass="w-full max-w-lg"
  panelClass="absolute top-4 left-4"
  (closeModal)="onClose()"
>
  <div class="p-5 space-y-5">
    <div class="space-y-2">
      <label class="block text-sm font-medium text-gray-700">Filtrer par nom</label>
      <input
        [(ngModel)]="filterName"
        (input)="onFiltersChange()"
        type="text"
        placeholder="Rechercher par nom..."
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent bg-white"
      />
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-medium text-gray-700">Filtrer par forme juridique</label>
      <select
        [(ngModel)]="filterForm"
        (change)="onFormChange()"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent bg-white"
      >
        <option value="">Toutes les formes</option>
        <option value="COOPERATIVE">Coopérative</option>
        <option value="ENTREPRISE">Entreprise</option>
        <option value="ASSOCIATION">Association</option>
      </select>
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-medium text-gray-700">Filtrer par ICE</label>
      <input
        [(ngModel)]="filterIce"
        (input)="onFiltersChange()"
        type="text"
        placeholder="Rechercher par ICE..."
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent bg-white"
      />
    </div>

    <div class="bg-orange-50 border border-orange-200 rounded-lg p-4 text-sm text-orange-800">
      <span class="font-semibold">{{ filteredMarkersCount }}</span>
      marqueur(s) affiché(s) sur
      <span class="font-semibold">{{ totalMarkers }}</span> au total
    </div>

    <button
      (click)="onClearFilters()"
      class="w-full bg-gray-100 text-gray-700 py-2.5 px-4 rounded-lg font-medium hover:bg-gray-200 border border-gray-300 transition-colors"
    >
      Réinitialiser les filtres
    </button>
  </div>
</app-modal-panel>
